<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mobile App Shell — DOMiNice</title>
  <link rel="stylesheet" href="../../components/domi.css">
  <script src="../../scripts/runtime/domi.js"></script>
  <style>
    body { margin:0; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:24px; box-sizing:border-box; }
    .phone { width: 390px; max-width: 100%; height: 780px; border-radius: 40px; background:#fff; box-shadow: 0 20px 60px rgba(61,35,66,0.4); overflow: hidden; display:flex; flex-direction:column; }
    .topbar { padding: 24px 16px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(61,35,66,0.1); }
    .body { flex:1; padding: 16px; overflow-y:auto; }
    .tabbar { display:flex; justify-content:space-around; padding: 12px 0 24px; border-top: 1px solid rgba(61,35,66,0.1); }
    .tab { font-family:'SF Mono',monospace; font-size: 10px; text-transform:uppercase; letter-spacing:0.05em; padding: 8px 12px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <button class="domi-btn domi-btn--ghost domi-btn--sm" data-feedback="top-back" type="button">← Back</button>
      <div class="domi-display" style="font-size:14px;">HOME</div>
      <button class="domi-btn domi-btn--ghost domi-btn--sm" data-feedback="top-menu" type="button">Menu</button>
    </div>
    <div class="body">
      <h1 class="domi-display" style="font-size:28px;margin-bottom:16px;">MOBILE.</h1>
      <div class="domi-card" style="margin-bottom:12px;">
        <div class="domi-label" style="font-size:11px;opacity:.6;">FEATURED</div>
        <p style="font-family:'SF Mono',monospace;font-size:13px;margin:8px 0 0;">Card content here.</p>
      </div>
      <div class="domi-card" data-feedback="card-secondary">
        <div class="domi-label" style="font-size:11px;opacity:.6;">SECONDARY</div>
        <p style="font-family:'SF Mono',monospace;font-size:13px;margin:8px 0 0;">Tap me.</p>
      </div>
      <button class="domi-btn domi-btn--primary" data-feedback="primary-cta" style="margin-top:16px;width:100%;" type="button">Primary action</button>
      <button class="domi-btn" data-export-feedback style="margin-top:8px;width:100%;" type="button">Export feedback</button>
    </div>
    <div class="tabbar">
      <span class="tab" data-feedback="tab-home">home</span>
      <span class="tab" data-feedback="tab-search">search</span>
      <span class="tab" data-feedback="tab-profile">profile</span>
    </div>
  </div>
</body>
</html>
