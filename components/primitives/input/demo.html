<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>input — domi</title>
  <link rel="stylesheet" href="../../domi.css">
</head>
<body style="padding:40px;display:flex;flex-direction:column;gap:12px;max-width:420px;">
  <input class="domi-input" type="text" placeholder="Default">
  <input class="domi-input domi-input--sm" type="text" placeholder="Small">
  <input class="domi-input domi-input--lg" type="text" placeholder="Large">
  <input class="domi-input domi-input--error" type="text" value="Invalid value">
  <input class="domi-input" type="text" value="Disabled" disabled>
</body>
</html>
