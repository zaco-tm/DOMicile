<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>modal — domi</title>
  <link rel="stylesheet" href="../../domi.css">
</head>
<body style="padding:40px;">
  <p>Modal shown via JS setting <code>[open]</code>:</p>
  <div class="domi-modal" id="m" open>
    <div class="domi-modal__dialog">
      <h3 class="domi-modal__title">Hello modal</h3>
      <p>This dialog is open.</p>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
        <button class="domi-btn domi-btn--ghost" onclick="document.getElementById('m').removeAttribute('open')" type="button">Close</button>
        <button class="domi-btn domi-btn--primary" type="button">Confirm</button>
      </div>
    </div>
  </div>
</body>
</html>
