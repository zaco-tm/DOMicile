<!-- Modal opens by adding the [open] attribute. Standalone-friendly. -->
<div class="domi-modal">
  <div class="domi-modal__dialog">
    <h3 class="domi-modal__title">Confirm action</h3>
    <p>Are you sure?</p>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
      <button class="domi-btn domi-btn--ghost" type="button">Cancel</button>
      <button class="domi-btn domi-btn--primary" type="button">Confirm</button>
    </div>
  </div>
</div>
