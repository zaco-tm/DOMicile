[package]
name = "domi-egui"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "DOMiNice 15-primitive widget library for egui (Phase 3c)."
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
egui = "0.32"
eframe = { version = "0.32", optional = true, default-features = false }

[features]
default = []
desktop = ["dep:eframe"]

[build-dependencies]
serde_json = "1"
sha2 = "0.10"

[dev-dependencies]
sha2 = "0.10"
pretty_assertions = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Document", "Window"] }
