name: publish-landing

# DISABLED — manual run only.
# Originally synced `templates/landing-page/index.html` (+ companion
# assets) to the repo root so GitHub Pages could serve them at the
# root URL. The root files are now maintained directly; running this
# workflow would clobber hand-edits. Re-enable by uncommenting the
# `push` trigger below and updating the `cp` step to the current
# source-of-truth layout.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: sync landing-page → root (disabled, manual only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: no-op (workflow disabled)
        run: |
          echo "publish-landing is disabled. Root index.html is maintained directly."
          echo "Re-enable by editing .github/workflows/publish-landing.yml."
          exit 0
